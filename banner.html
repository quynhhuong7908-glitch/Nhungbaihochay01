<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Banner THPT Ngô Quyền</title>
<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
    }

    .banner {
        background-color: #0b3d91; /* Xanh dương đậm */
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 50px;
        height: 180px;
    }

    .logo {
        display: flex;
        align-items: center;
    }

    .logo img {
        height: 140px;
    }

    .text {
        text-align: right;
    }

    .text h1 {
        margin: 0;
        font-size: 36px;
        font-weight: bold;
    }

    .text h2 {
        margin: 10px 0 0 0;
        font-size: 24px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="banner">
    <div class="logo">
        <img src="logo.png" alt="Logo THPT Ngô Quyền">
    </div>
    <div class="text">
        <h1>Trường THPT Ngô Quyền</h1>
        <h2>Trang Chuyên Tin Học 12</h2>
    </div>
</div>

</body>
</html>
